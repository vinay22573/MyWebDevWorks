<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2&family=Poppins:wght@300&display=swap');
        *{
            margin:0;
            padding: 0;
        }
        body{
            background-color: rgb(167, 167, 167);
            padding: 45px;
            display: flex;
        }
        
        .card{
            margin:20px;
            background-color: rgb(238, 238, 238);
            width: 379px;
            height: 600px;
            border-radius: 10px;
            box-shadow: 3px 3px 0px 0px #ffffff

        }
        .imag{
            /* display: flex;
            justify-content: center; */
            padding:10px;
            /* border:1px solid black; */
            box-sizing: border-box;
            margin: 0px;
        }
        .imag img{
             border-radius: 15px;
        }
        .tags{
            margin:10px;
            /* border: 2px solid black; */
            box-sizing: border-box;

        }
        .tags span{
            border: 1.5px solid rgb(161, 161, 161);
            color:  rgb(96, 96, 96);
            padding: 5px ;
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 20px;
            text-align: center;
            font-family: 'Poppins', sans-serif;

        }
        .heading{
            margin-left: 10px;
            margin-top: 10px;
            padding: 5px;
            /* border: 2px solid black; */
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;

        }
        .about{
            height: 20%;
            /* border: 2px solid black; */
            padding: 5px;
            margin-left: 10%;
            margin-right: 10%;
            margin-top: 5px;
            margin-bottom: 5px;
            text-overflow: ellipsis;
            text-align: center;
            box-sizing: border-box;
            border-radius: 15px;
            background-color: rgb(255, 255, 255);
            box-shadow: 2px -2px 3px 0px #d5e4fff0;
            line-height: 21px;
            /* letter-spacing: 1.1px; */
            font-family: 'Poppins', sans-serif;
        }
        .CTA{
            /* border: 2px solid black; */
            background-color: rgb(236, 255, 255);
            color: rgb(0, 153, 255);
            height: 3%;
            padding:15px;
            padding-left: 43px;
            padding-top: 5px;
            font-weight: 600;
            /* margin:10px; */
            /* box-sizing: border-box; */
            margin-top: 15px;
            margin-left: 25%;
            margin-right: 30%;
            border-radius: 30px;
            font-family: 'Poppins', sans-serif;
        }
        .CTA:hover{
            background-color: rgb(0, 85, 255);
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="imag">
                <img src="Lake.jpg" alt="LakeImage" width="360">
        </div>
        <div class="tags">
            <span>Nature</span>
            <span>Lake</span>
        </div>
            
        <div class="heading"><h1>Dal Lake</h1></div>
        <div class="about">Dal Lake in Srinagar, Kashmir, is renowned for its scenic beauty, houseboats, and Shikaras, offering a serene and picturesque retreat amidst the Himalayas.</div>
        <div class="CTA">Read More</div>
    </div>
    
    
</body>
</html>
